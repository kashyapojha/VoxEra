name: VoIPSight CI/CD Pipeline

on:
push:
branches:
- main
pull_request:
branches:
- main

jobs:
build-and-test:
name: Build & Test
runs-on: ubuntu-latest


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install frontend dependencies
    run: npm ci

  - name: Build frontend
    run: npm run build


docker-build-push:
name: Docker Build & Push
runs-on: ubuntu-latest
needs: build-and-test
if: github.ref == 'refs/heads/main' && github.event_name == 'push'


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Build frontend image
    run: |
      docker build \
        -t ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:latest .

  - name: Push frontend image
    run: |
      docker push ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:latest


deploy-to-aws:
name: Deploy to AWS EC2
runs-on: ubuntu-latest
needs: docker-build-push
if: github.ref == 'refs/heads/main' && github.event_name == 'push'


steps:
  - name: Deploy to EC2 via SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ec2-user
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:latest

