name: VoIPSight CI/CD Pipeline

on:
push:
branches: [main]
pull_request:
branches: [main]

jobs:

# ════════════════════════════════════════

# JOB 1 — BUILD AND TEST

# ════════════════════════════════════════

build-and-test:
name: Build & Test
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'
      cache: 'npm'

  # Frontend
  - name: Install frontend dependencies
    run: npm ci

  - name: Run frontend lint
    run: npm run lint --if-present

  - name: Build frontend
    run: npm run build
    env:
      VITE_SIP_DOMAIN: ${{ secrets.VITE_SIP_DOMAIN }}
      VITE_SIP_WS: ${{ secrets.VITE_SIP_WS }}
      VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}

  - name: Upload frontend build artifact
    uses: actions/upload-artifact@v4
    with:
      name: frontend-dist
      path: dist/
      retention-days: 1

  # Backend
  - name: Install backend dependencies
    working-directory: ./backend
    run: npm ci

  - name: Run backend tests
    working-directory: ./backend
    run: npm test --if-present
    env:
      NODE_ENV: test
```

# ════════════════════════════════════════

# JOB 2 — DOCKER BUILD & PUSH

# ════════════════════════════════════════

docker-build-push:
name: Docker Build & Push
runs-on: ubuntu-latest
needs: build-and-test
if: github.ref == 'refs/heads/main' && github.event_name == 'push'

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Download frontend build artifact
    uses: actions/download-artifact@v4
    with:
      name: frontend-dist
      path: dist/

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  # Frontend image
  - name: Build frontend Docker image
    run: |
      docker build \
        -t ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:${{ github.sha }} \
        -t ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:latest .

  - name: Push frontend image
    run: |
      docker push ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:${{ github.sha }}
      docker push ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:latest

  # Backend image
  - name: Build backend Docker image
    run: |
      docker build \
        -t ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-backend:${{ github.sha }} \
        -t ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-backend:latest \
        ./backend

  - name: Push backend image
    run: |
      docker push ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-backend:${{ github.sha }}
      docker push ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-backend:latest
```

# ════════════════════════════════════════

# JOB 3 — DEPLOY TO EC2

# ════════════════════════════════════════

deploy-to-aws:
name: Deploy to AWS EC2
runs-on: ubuntu-latest
needs: docker-build-push
if: github.ref == 'refs/heads/main' && github.event_name == 'push'

```
steps:
  - name: Deploy to EC2 via SSH
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ec2-user
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:latest
        docker pull ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-backend:latest

        docker stop voipsight-frontend voipsight-backend 2>/dev/null || true
        docker rm voipsight-frontend voipsight-backend 2>/dev/null || true

        docker network create voipsight-net 2>/dev/null || true

        docker run -d \
          --name voipsight-backend \
          --network voipsight-net \
          --restart unless-stopped \
          -p 5000:5000 \
          -e NODE_ENV=production \
          ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-backend:latest

        docker run -d \
          --name voipsight-frontend \
          --network voipsight-net \
          --restart unless-stopped \
          -p 80:80 \
          ${{ secrets.DOCKERHUB_USERNAME }}/voipsight-frontend:latest

        docker image prune -f

  - name: Verify deployment
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ec2-user
      key: ${{ secrets.EC2_SSH_KEY }}
      script: |
        docker ps --filter "name=voipsight"
