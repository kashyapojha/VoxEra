name: VoxEra CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOCKER_FRONTEND_REPO: ${{ vars.DOCKER_FRONTEND_REPO || 'voxera-frontend' }}
  DOCKER_BACKEND_REPO: ${{ vars.DOCKER_BACKEND_REPO || 'voxera-backend' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint build (frontend)
        run: npm run build

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Syntax check backend
        working-directory: backend
        run: npm test

  docker-build-push:
    name: Docker Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: meta
        run: |
          SHA="${GITHUB_SHA::7}"
          USER="${{ secrets.DOCKER_USERNAME }}"
          echo "tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "frontend=${USER}/${{ env.DOCKER_FRONTEND_REPO }}" >> "$GITHUB_OUTPUT"
          echo "backend=${USER}/${{ env.DOCKER_BACKEND_REPO }}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.frontend }}:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_SIP_WS_URL=${{ secrets.VITE_SIP_WS_URL }}
            VITE_SIP_URI=${{ secrets.VITE_SIP_URI }}
            VITE_SIP_PASSWORD=${{ secrets.VITE_SIP_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.backend }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.backend }}:latest

  deploy-ec2:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read

    steps:
      - name: Setup SSH key
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_KEY_B64: ${{ secrets.EC2_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          if [ -z "${EC2_HOST}" ]; then
            echo "ERROR: EC2_HOST secret is missing or empty"
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${EC2_SSH_KEY:-}" ]; then
            printf '%s\n' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/ec2_key
          elif [ -n "${EC2_SSH_KEY_B64:-}" ]; then
            printf '%s' "$EC2_SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/ec2_key
          else
            echo "ERROR: Set EC2_SSH_KEY or EC2_SSH_KEY_B64 secret"
            exit 1
          fi
          chmod 600 ~/.ssh/ec2_key
          if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/ec2_key; then
            echo "ERROR: EC2 SSH key does not look like a valid private key"
            exit 1
          fi
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSH key ready for $EC2_HOST"

      - name: Deploy containers on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_DEPLOY_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          APP_DIR: /home/${{ secrets.EC2_USER || 'ubuntu' }}/voxera
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ github.token }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKER_FRONTEND_REPO: ${{ env.DOCKER_FRONTEND_REPO }}
          DOCKER_BACKEND_REPO: ${{ env.DOCKER_BACKEND_REPO }}
          IMAGE_TAG: ${{ github.sha }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          PUBLIC_HOST: ${{ secrets.PUBLIC_HOST }}
          ASTERISK_EXTERNAL_IP: ${{ secrets.ASTERISK_EXTERNAL_IP }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key_path: /home/runner/.ssh/ec2_key
          command_timeout: 20m
          envs: EC2_DEPLOY_USER,APP_DIR,GITHUB_REPO,GITHUB_REF_NAME,GITHUB_TOKEN,DOCKER_USERNAME,DOCKERHUB_TOKEN,DOCKER_FRONTEND_REPO,DOCKER_BACKEND_REPO,IMAGE_TAG,JWT_SECRET,POSTGRES_PASSWORD,PUBLIC_HOST,ASTERISK_EXTERNAL_IP
          script: |
            set -e
            export IMAGE_TAG="${IMAGE_TAG::7}"
            EC2_DEPLOY_USER="${EC2_DEPLOY_USER:-ubuntu}"
            APP_DIR="${APP_DIR:-/home/${EC2_DEPLOY_USER}/voxera}"
            export APP_DIR
            : "${JWT_SECRET:?JWT_SECRET GitHub secret is required}"
            : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD GitHub secret is required}"
            : "${PUBLIC_HOST:?PUBLIC_HOST GitHub secret is required}"
            : "${DOCKER_USERNAME:?DOCKER_USERNAME GitHub secret is required}"
            : "${DOCKERHUB_TOKEN:?DOCKERHUB_TOKEN GitHub secret is required}"

            if command -v apt-get &>/dev/null; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq git curl python3
            elif command -v dnf &>/dev/null; then
              sudo dnf install -y -q git curl python3
            elif command -v yum &>/dev/null; then
              sudo yum install -y -q git curl python3
            fi

            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
            if [ -d "$APP_DIR/.git" ]; then
              echo "Updating repo in $APP_DIR (branch ${GITHUB_REF_NAME})..."
              cd "$APP_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin "$GITHUB_REF_NAME" --depth 1
              git reset --hard "origin/${GITHUB_REF_NAME}"
            else
              if [ -d "$APP_DIR" ]; then
                echo "Directory $APP_DIR exists without git metadata; removing and recloning..."
                rm -rf "$APP_DIR"
              else
                echo "Cloning repo to $APP_DIR (branch ${GITHUB_REF_NAME})..."
              fi
              git clone --depth 1 -b "$GITHUB_REF_NAME" "$REPO_URL" "$APP_DIR"
            fi

            if ! docker info &>/dev/null 2>&1 && ! sudo docker info &>/dev/null 2>&1; then
              echo "Docker not found; running one-time bootstrap..."
              sudo bash "$APP_DIR/scripts/bootstrap-ec2.sh"
            fi

            chmod +x "$APP_DIR/scripts/deploy-ec2.sh"
            bash "$APP_DIR/scripts/deploy-ec2.sh"

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${EC2_USER}@${EC2_HOST}" \
            'curl -fsS http://localhost/api/health && docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"'
