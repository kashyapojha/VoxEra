# Production stack on EC2 — frontend/backend from Docker Hub, Asterisk built on host.
# Env file is generated at deploy time by scripts/deploy-ec2.sh (never commit .env.production).
services:
  backend:
    image: ${DOCKER_USERNAME}/${DOCKER_BACKEND_REPO}:${IMAGE_TAG}
    container_name: voxera-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_HOST: ${PUBLIC_HOST}
      ASTERISK_HOST: asterisk
      ASTERISK_PORT: ${ASTERISK_PORT:-8088}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voxera-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: ${DOCKER_USERNAME}/${DOCKER_FRONTEND_REPO}:${IMAGE_TAG}
    container_name: voxera-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - voxera-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: voxera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voxera}
      POSTGRES_USER: ${POSTGRES_USER:-voxera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - voxera-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxera} -d ${POSTGRES_DB:-voxera}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: voxera-asterisk
    restart: unless-stopped
    ports:
      - "${ASTERISK_WSS_PORT:-8088}:8088"
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10099}:${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10099}/udp"
    volumes:
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/http.conf:/etc/asterisk/http.conf:ro
      - asterisk-logs:/var/log/asterisk
    environment:
      ASTERISK_EXTERNAL_IP: ${ASTERISK_EXTERNAL_IP}
      ASTERISK_UID: ${ASTERISK_UID:-1000}
      ASTERISK_GID: ${ASTERISK_GID:-1000}
    networks:
      - voxera-net

networks:
  voxera-net:
    driver: bridge

volumes:
  pgdata:
  asterisk-logs:
