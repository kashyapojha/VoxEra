# Local / full stack. Default env: .env.local
# Production on same machine: ENV_FILE=.env.production docker compose up --build
services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SIP_WS_URL: ${VITE_SIP_WS_URL:-ws://${ASTERISK_EXTERNAL_IP:-127.0.0.1}:8089/ws}
        VITE_SIP_URI: ${VITE_SIP_URI:-sip:1001@${ASTERISK_EXTERNAL_IP:-127.0.0.1}}
        VITE_SIP_PASSWORD: ${VITE_SIP_PASSWORD:-1001}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - voxera-net
    restart: unless-stopped

  asterisk:
    build:
      context: ./asterisk
      dockerfile: Dockerfile
    container_name: voxera-asterisk
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "asterisk -rx 'module show like res_http_websocket' | grep -q res_http_websocket && asterisk -rx 'pjsip show endpoint 1001' | grep -q 'Endpoint:' && asterisk -rx 'pjsip show aor 1001' | grep -q 'Aor:'",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s
    ports:
      - "${ASTERISK_WSS_PORT:-8089}:${ASTERISK_WSS_PORT:-8089}"
      - "${ASTERISK_SIP_PORT:-5060}:5060/udp"
      - "${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10099}:${ASTERISK_RTP_START:-10000}-${ASTERISK_RTP_END:-10099}/udp"
    volumes:
      - ./asterisk/pjsip.conf.template:/etc/asterisk/templates/pjsip.conf.template:ro
      - ./asterisk/http.conf.template:/etc/asterisk/templates/http.conf.template:ro
      - ./asterisk/modules.conf:/etc/asterisk/modules.conf:ro
      - ./asterisk/sorcery.conf:/etc/asterisk/sorcery.conf:ro
      - ./asterisk/extconfig.conf:/etc/asterisk/extconfig.conf:ro
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf:ro
      - ./asterisk/rtp.conf:/etc/asterisk/rtp.conf:ro
      - ./asterisk/logs:/var/log/asterisk
    environment:
      ASTERISK_EXTERNAL_IP: ${ASTERISK_EXTERNAL_IP:-127.0.0.1}
      ASTERISK_WS_PORT: ${ASTERISK_WSS_PORT:-8089}
      ASTERISK_UID: ${ASTERISK_UID:-1000}
      ASTERISK_GID: ${ASTERISK_GID:-1000}
    networks:
      - voxera-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-5000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      ASTERISK_HOST: ${ASTERISK_HOST:-asterisk}
      ASTERISK_PORT: ${ASTERISK_PORT:-8089}
      DATABASE_URL: ${DATABASE_URL:-postgres://voxera:voxera_dev@postgres:5432/voxera}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - voxera-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: voxera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voxera}
      POSTGRES_USER: ${POSTGRES_USER:-voxera}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voxera_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - voxera-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voxera} -d ${POSTGRES_DB:-voxera}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  voxera-net:
    driver: bridge

volumes:
  pgdata:
