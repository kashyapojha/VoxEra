; VoxEra PJSIP/WebRTC module policy.
; IMPORTANT: this file replaces the base image modules.conf — keep autoload=yes.
[modules]
autoload = yes

preload => res_sorcery.so
preload => res_sorcery_config.so
preload => res_pjsip.so
preload => res_http_websocket.so
preload => res_pjsip_transport_websocket.so

; chan_sip must not answer WebSocket REGISTER before res_pjsip (causes 401).
noload => chan_sip.so
noload => res_pjsip_config_wizard.so
; Asterisk 23+ only — not needed for PJSIP SIP/WebRTC signaling.
noload => chan_websocket.so
