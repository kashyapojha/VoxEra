; VoxEra PJSIP/WebRTC module policy — copied into image at build time.
[modules]
autoload = yes

; Load before pjsip.conf is parsed.
preload => res_pjsip.so
preload => res_http_websocket.so
preload => res_pjsip_transport_websocket.so

noload => chan_sip.so
noload => res_pjsip_config_wizard.so
noload => chan_websocket.so
